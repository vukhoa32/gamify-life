<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Gamify Life</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='0.9em' font-size='64'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="src/style.css?v=20260706">
</head>
<body>
  <div id="app">
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="activities" role="tab" aria-selected="true">Activities</button>
      <button class="tab" data-tab="events" role="tab" aria-selected="false">Events</button>
      <button class="tab" data-tab="goals" role="tab" aria-selected="false">Goals</button>
    </nav>

    <main class="screen active" id="screen-activities" role="tabpanel">
      <section class="activity-picker" id="activity-picker">
        <h2 class="section-label">Log activity</h2>
        <div class="activity-grid" id="activity-grid"></div>
      </section>

      <section class="log-panel" id="log-panel">
        <h2 class="section-label">Today's log</h2>
        <div class="log-list" id="log-list"></div>
        <div class="date-icons-view hidden" id="date-icons-view"></div>
      </section>

      <footer class="view-footer">
        <button type="button" class="view-btn" data-view="expanded" aria-label="Full log" title="Full log">⛶</button>
        <button type="button" class="view-btn" data-view="icons" aria-label="Date icons" title="Date icons">🗓</button>
      </footer>
    </main>

    <main class="screen" id="screen-events" role="tabpanel">
      <section class="event-panel">
        <div class="event-toolbar">
          <button type="button" class="btn btn-primary" id="event-add-btn">Add event</button>
          <button type="button" class="btn btn-ghost" id="event-sort-btn">Sort by event date</button>
        </div>
        <div class="event-list" id="event-list"></div>
      </section>
    </main>

    <main class="screen" id="screen-goals" role="tabpanel">
      <p class="placeholder">Goals — coming soon</p>
    </main>
  </div>

  <dialog id="log-dialog">
    <form method="dialog" id="log-form">
      <h3 id="dialog-title">Log activity</h3>
      <label class="checkbox-row">
        <input type="checkbox" id="high-intensity">
        <span>High intensity?</span>
      </label>
      <label class="field">
        <span>Description</span>
        <textarea id="description" rows="2" placeholder="Optional note…"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="dialog-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="dialog-ok">OK</button>
      </div>
    </form>
  </dialog>

  <dialog id="event-dialog">
    <form method="dialog" id="event-form">
      <h3 id="event-dialog-title">Add event</h3>
      <label class="field">
        <span>Title</span>
        <input type="text" id="event-title" placeholder="Birthday, meeting…">
      </label>
      <label class="field">
        <span>Event date</span>
        <input type="date" id="event-date">
      </label>
      <label class="field">
        <span>Description</span>
        <textarea id="event-description" rows="4" placeholder="Optional notes…"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="event-dialog-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </dialog>

  <div class="toast hidden" id="toast"></div>

  <script src="src/app.js?v=20260706"></script>
  <script src="src/firebase-config.js?v=20260706"></script>
  <script src="src/firebase-init.js?v=20260706"></script>
</body>
</html>
