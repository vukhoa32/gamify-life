<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Gamify Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="activities" role="tab" aria-selected="true">Activities</button>
      <button class="tab" data-tab="events" role="tab" aria-selected="false">Events</button>
      <button class="tab" data-tab="goals" role="tab" aria-selected="false">Goals</button>
    </nav>

    <main class="screen active" id="screen-activities" role="tabpanel">
      <section class="activity-picker" id="activity-picker">
        <h2 class="section-label">Log activity</h2>
        <div class="activity-grid" id="activity-grid"></div>
      </section>

      <section class="log-panel" id="log-panel">
        <h2 class="section-label">Today's log</h2>
        <div class="log-list" id="log-list"></div>
        <div class="date-icons-view hidden" id="date-icons-view"></div>
      </section>

      <footer class="view-footer">
        <button type="button" class="view-btn" data-view="expanded" aria-label="Full log" title="Full log">⛶</button>
        <button type="button" class="view-btn" data-view="icons" aria-label="Date icons" title="Date icons">🗓</button>
      </footer>
    </main>

    <main class="screen" id="screen-events" role="tabpanel">
      <p class="placeholder">Events — coming soon</p>
    </main>

    <main class="screen" id="screen-goals" role="tabpanel">
      <p class="placeholder">Goals — coming soon</p>
    </main>
  </div>

  <dialog id="log-dialog">
    <form method="dialog" id="log-form">
      <h3 id="dialog-title">Log activity</h3>
      <label class="checkbox-row">
        <input type="checkbox" id="high-intensity">
        <span>High intensity?</span>
      </label>
      <label class="field">
        <span>Description</span>
        <textarea id="description" rows="2" placeholder="Optional note…"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="dialog-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="dialog-ok">OK</button>
      </div>
    </form>
  </dialog>

  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
